name: Test

on:
  push:

jobs:
  prepare:
  runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v2
        with:
          node-version: 16
      - name: Install
        run: pnpm install
      - name: Lint
        run: pnpm run lint
